name: Deploy ArgoCD Agent (GKE)

on:
  push:
    branches:
      - '**'  # Trigger on push to any branch (for testing)
    paths:
      - 'argocd-agent/terraform/**'
      - '.github/workflows/deploy-argocd-agent-gke.yaml' 
  workflow_dispatch:
    inputs:
      terraform_action:
        description: 'Terraform Action'
        required: true
        type: choice
        options:
          - plan
          - apply
        default: 'plan'
      environment:
        description: 'Target Environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  TERRAFORM_VERSION: '1.5.7'
  CLOUD_PROVIDER: 'gke'

jobs:
  setup-environment:
    name: Setup Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      working_dir: ${{ steps.set-env.outputs.working_dir }}
    steps:
      - uses: actions/checkout@v4
      - name: Set Environment Variables
        id: set-env
        run: |
          ENV="${{ inputs.environment || 'prod' }}"
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          # Path relative to repository root
          echo "working_dir=argocd-agent/terraform/environments/$ENV" >> $GITHUB_OUTPUT

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: setup-environment
    environment: ${{ needs.setup-environment.outputs.environment }}
    env:
      KUBECONFIG: /home/runner/.kube/config
    steps:
      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          args: --advertise-tags=tag:ci --accept-routes
          hostname: github-runner-plan-${{ github.run_id }}

      - name: Wait for Tailscale Connection
        run: |
          echo "Waiting for Tailscale to establish VPN connection..."
          sleep 15
          
          echo "======================================"
          echo "Tailscale Diagnostics"
          echo "======================================"
          
          echo "\n1. Tailscale Status:"
          sudo tailscale status
          
          echo "\n2. Tailscale IP:"
          sudo tailscale ip -4
          
          echo "\n3. Tailscale Routes:"
          sudo tailscale status --json | jq -r '.Peer[] | select(.TailscaleIPs != null) | "Peer: \(.HostName) - IPs: \(.TailscaleIPs[])"' || sudo tailscale status
          
          echo "\n4. Waiting additional 10 seconds for routes to stabilize..."
          sleep 10
          
          echo "\n5. Final Tailscale status:"
          sudo tailscale status
          
          echo "\n======================================"
          echo "Tailscale setup complete"
          echo "======================================"

      - name: Setup Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          
      - name: Verify Spoke Cluster Connectivity
        env:
          WORKLOAD_CLUSTERS_JSON: ${{ secrets.WORKLOAD_CLUSTERS_JSON }}
        run: |
          echo "======================================"
          echo "Spoke Cluster Connectivity Verification"
          echo "======================================"
          
          if [ -z "$WORKLOAD_CLUSTERS_JSON" ]; then
            echo "No workload clusters configured, skipping connectivity check"
            exit 0
          fi
          
          # Extract spoke cluster info from JSON
          echo "\nParsing workload clusters configuration..."
          CONTEXTS=$(echo "$WORKLOAD_CLUSTERS_JSON" | jq -r 'values[]' 2>/dev/null || echo "")
          
          if [ -z "$CONTEXTS" ]; then
            echo "Could not parse spoke contexts from WORKLOAD_CLUSTERS_JSON"
            exit 0
          fi
          
          echo "\nTesting connectivity to spoke clusters..."
          for CONTEXT in $CONTEXTS; do
            echo "\n--- Testing context: $CONTEXT ---"
            
            # Check if context exists in kubeconfig
            if ! kubectl config get-contexts "$CONTEXT" &>/dev/null; then
              echo "  ✗ ERROR: Context $CONTEXT not found in kubeconfig"
              echo "\nAvailable contexts:"
              kubectl config get-contexts
              exit 1
            fi
            
            echo "  ✓ Context $CONTEXT found in kubeconfig"
            
            # Extract cluster endpoint IP
            CLUSTER_SERVER=$(kubectl config view -o jsonpath="{.clusters[?(@.name==\"$CONTEXT\")].cluster.server}" 2>/dev/null)
            echo "  Cluster endpoint: $CLUSTER_SERVER"
            
            # Extract IP from server URL (format: https://IP:PORT)
            CLUSTER_IP=$(echo "$CLUSTER_SERVER" | sed -E 's|https?://([^:]+):.*|\1|')
            echo "  Cluster IP: $CLUSTER_IP"
            
            # Test network connectivity to the IP
            echo "  Testing network connectivity to $CLUSTER_IP..."
            if timeout 5 ping -c 2 "$CLUSTER_IP" &>/dev/null; then
              echo "  ✓ Ping successful to $CLUSTER_IP"
            else
              echo "  ⚠ Ping failed to $CLUSTER_IP (may be blocked by firewall)"
            fi
            
            # Test Kubernetes API connectivity
            echo "  Testing Kubernetes API connection..."
            if timeout 15 kubectl get nodes --context "$CONTEXT" &>/dev/null; then
              echo "  ✓ Successfully connected to $CONTEXT"
            else
              echo "  ⚠ WARNING: Initial connection failed, investigating..."
              
              echo "\n  Diagnostics:"
              echo "  - Tailscale status:"
              sudo tailscale status | head -20
              
              echo "\n  - Attempting direct curl to API server:"
              timeout 5 curl -k "$CLUSTER_SERVER/healthz" 2>&1 || echo "  Direct API connection failed"
              
              echo "\n  - Waiting 20 more seconds for Tailscale routes..."
              sleep 20
              
              # Final retry
              echo "  Retrying kubectl connection..."
              if timeout 15 kubectl get nodes --context "$CONTEXT" &>/dev/null; then
                echo "  ✓ Successfully connected to $CONTEXT after extended wait"
              else
                echo "  ✗ ERROR: Cannot reach cluster $CONTEXT"
                echo "\n  Final diagnostics:"
                echo "  - Tailscale peers:"
                sudo tailscale status
                echo "\n  - Network routes:"
                ip route | grep -E '100\.' || echo "  No Tailscale routes found"
                exit 1
              fi
            fi
          done
          
          echo "\n======================================"
          echo "✓ All spoke clusters are reachable"
          echo "======================================"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Install gke-gcloud-auth-plugin
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-transport-https ca-certificates gnupg curl
          curl https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | sudo tee -a /etc/apt/sources.list.d/google-cloud-sdk.list
          sudo apt-get update
          sudo apt-get install -y google-cloud-sdk-gke-gcloud-auth-plugin

      - name: Configure kubectl (GKE)
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.CLUSTER_NAME }}
          location: ${{ secrets.REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Verify kubectl connection
        run: |
          echo "Current kubectl context:"
          kubectl config current-context
          echo "Available contexts:"
          kubectl config get-contexts
          echo "Cluster info:"
          kubectl cluster-info
          echo "Testing connection to hub cluster..."
          kubectl get nodes

      - name: Config Backend
        working-directory: ${{ needs.setup-environment.outputs.working_dir }}
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET_ARGOCD }}
        run: |
          chmod +x $GITHUB_WORKSPACE/.github/scripts/configure-backend.sh
          $GITHUB_WORKSPACE/.github/scripts/configure-backend.sh gke ${{ needs.setup-environment.outputs.environment }}

      - name: Terraform Init
        working-directory: ${{ needs.setup-environment.outputs.working_dir }}
        run: terraform init

      - name: Create terraform.tfvars
        working-directory: ${{ needs.setup-environment.outputs.working_dir }}
        env:
          WORKLOAD_CLUSTERS_JSON: ${{ secrets.WORKLOAD_CLUSTERS_JSON }}
        run: |
          # Get the actual current kubectl context name
          KUBE_CONTEXT=$(kubectl config current-context)
          
          # Fetch cluster details using gcloud (bypasses terraform data source permissions issue)
          CLUSTER_ENDPOINT=$(gcloud container clusters describe ${{ secrets.CLUSTER_NAME }} --zone ${{ secrets.REGION }} --format="value(endpoint)")
          CLUSTER_CA=$(gcloud container clusters describe ${{ secrets.CLUSTER_NAME }} --zone ${{ secrets.REGION }} --format="value(masterAuth.clusterCaCertificate)")

          cat > terraform.tfvars <<EOF
          project_id               = "${{ secrets.GCP_PROJECT_ID }}"
          cluster_name             = "${{ secrets.CLUSTER_NAME }}"
          region                   = "${{ secrets.REGION }}"
          cluster_endpoint         = "$CLUSTER_ENDPOINT"
          cluster_ca_certificate   = "$CLUSTER_CA"
          hub_cluster_context      = "$KUBE_CONTEXT"
          hub_namespace            = "argocd"
          spoke_namespace          = "argocd"
          create_default_admin_user = true
          default_admin_password   = "${{ secrets.PASSWORD }}"
          
          # Keycloak
          enable_keycloak          = ${{ secrets.KEYCLOAK_URL != '' }}
          keycloak_url             = "${{ secrets.KEYCLOAK_URL }}"
          keycloak_client_id       = "${{ secrets.KEYCLOAK_CLIENT_ID }}"
          keycloak_password        = "${{ secrets.KEYCLOAK_PASSWORD }}"
          argocd_url               = "${{ secrets.ARGOCD_URL }}"

          # Ingress/Cert
          letsencrypt_email        = "${{ secrets.LETSENCRYPT_EMAIL_ARGOCD }}"
          argocd_host              = "${{ secrets.ARGOCD_HOST }}"
          EOF
          
          # Append workload_clusters if secret exists
          if [ -n "$WORKLOAD_CLUSTERS_JSON" ]; then
            echo "" >> terraform.tfvars
            echo "workload_clusters = $WORKLOAD_CLUSTERS_JSON" >> terraform.tfvars
            echo "✅ appended workload_clusters to terraform.tfvars"
          fi

          echo "✅ Created terraform.tfvars" 

      - name: Terraform Plan
        id: plan
        working-directory: ${{ needs.setup-environment.outputs.working_dir }}
        run: |
          set +e
          terraform plan -out=tfplan -detailed-exitcode
          EXIT_CODE=$?
          set -e
          echo "exitcode=$EXIT_CODE" >> $GITHUB_OUTPUT
          if [ $EXIT_CODE -eq 1 ]; then exit 1; fi
          terraform show -no-color tfplan > plan.txt
          exit 0

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ needs.setup-environment.outputs.environment }}
          path: |
            ${{ needs.setup-environment.outputs.working_dir }}/tfplan
            ${{ needs.setup-environment.outputs.working_dir }}/plan.txt
          retention-days: 5

      - name: Comment PR (Plan)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planPath = '${{ needs.setup-environment.outputs.working_dir }}/plan.txt';
            let plan = '';
            try { plan = fs.readFileSync(planPath, 'utf8'); } catch (e) { plan = 'Plan file invalid.'; }
            const truncatedPlan = plan.length > 65000 ? plan.substring(0, 65000) + '...' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🌍 Terraform Plan (GKE - ${{ needs.setup-environment.outputs.environment }})\n\`\`\`hcl\n${truncatedPlan}\n\`\`\``
            })

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [setup-environment, terraform-plan]
    environment: ${{ needs.setup-environment.outputs.environment }}
    env:
      KUBECONFIG: /home/runner/.kube/config
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.terraform_action == 'apply')
    
    steps:
      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          args: --advertise-tags=tag:ci --accept-routes
          hostname: github-runner-${{ github.run_id }}

      - name: Wait for Tailscale Connection
        run: |
          echo "Waiting for Tailscale to establish VPN connection..."
          sleep 15
          
          echo "======================================"
          echo "Tailscale Diagnostics"
          echo "======================================"
          
          echo "\n1. Tailscale Status:"
          sudo tailscale status
          
          echo "\n2. Tailscale IP:"
          sudo tailscale ip -4
          
          echo "\n3. Tailscale Routes:"
          sudo tailscale status --json | jq -r '.Peer[] | select(.TailscaleIPs != null) | "Peer: \(.HostName) - IPs: \(.TailscaleIPs[])"' || sudo tailscale status
          
          echo "\n4. Waiting additional 10 seconds for routes to stabilize..."
          sleep 10
          
          echo "\n5. Final Tailscale status:"
          sudo tailscale status
          
          echo "\n======================================"
          echo "Tailscale setup complete"
          echo "======================================"

      - name: Setup Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          
      - name: Verify Spoke Cluster Connectivity
        env:
          WORKLOAD_CLUSTERS_JSON: ${{ secrets.WORKLOAD_CLUSTERS_JSON }}
        run: |
          echo "Verifying spoke cluster connectivity via Tailscale..."
          
          if [ -z "$WORKLOAD_CLUSTERS_JSON" ]; then
            echo "No workload clusters configured, skipping connectivity check"
            exit 0
          fi
          
          # Extract spoke contexts from JSON
          CONTEXTS=$(echo "$WORKLOAD_CLUSTERS_JSON" | jq -r 'values[]' 2>/dev/null || echo "")
          
          if [ -z "$CONTEXTS" ]; then
            echo "Could not parse spoke contexts from WORKLOAD_CLUSTERS_JSON"
            exit 0
          fi
          
          echo "Testing connectivity to spoke clusters..."
          for CONTEXT in $CONTEXTS; do
            echo "Testing context: $CONTEXT"
            
            # Check if context exists in kubeconfig
            if kubectl config get-contexts "$CONTEXT" &>/dev/null; then
              echo "  ✓ Context $CONTEXT found in kubeconfig"
              
              # Test actual connectivity with timeout
              if timeout 10 kubectl get nodes --context "$CONTEXT" &>/dev/null; then
                echo "  ✓ Successfully connected to $CONTEXT"
              else
                echo "  ⚠ WARNING: Context $CONTEXT exists but cluster is not reachable"
                echo "  This may indicate Tailscale tunnel is not fully established"
                echo "  Waiting 15 more seconds..."
                sleep 15
                
                # Retry once
                if timeout 10 kubectl get nodes --context "$CONTEXT" &>/dev/null; then
                  echo "  ✓ Successfully connected to $CONTEXT after retry"
                else
                  echo "  ✗ ERROR: Cannot reach cluster $CONTEXT"
                  exit 1
                fi
              fi
            else
              echo "  ✗ ERROR: Context $CONTEXT not found in kubeconfig"
              echo "Available contexts:"
              kubectl config get-contexts
              exit 1
            fi
          done
          
          echo "✓ All spoke clusters are reachable"

      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Install gke-gcloud-auth-plugin
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-transport-https ca-certificates gnupg curl
          curl https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | sudo tee -a /etc/apt/sources.list.d/google-cloud-sdk.list
          sudo apt-get update
          sudo apt-get install -y google-cloud-sdk-gke-gcloud-auth-plugin

      - name: Configure kubectl (GKE)
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.CLUSTER_NAME }}
          location: ${{ secrets.REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Verify kubectl connection
        run: |
          echo "Current kubectl context:"
          kubectl config current-context
          echo "Available contexts:"
          kubectl config get-contexts
          echo "Cluster info:"
          kubectl cluster-info
          echo "Testing connection to hub cluster..."
          kubectl get nodes

      - name: Config Backend
        working-directory: ${{ needs.setup-environment.outputs.working_dir }}
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET_ARGOCD }}
        run: |
          chmod +x $GITHUB_WORKSPACE/.github/scripts/configure-backend.sh
          $GITHUB_WORKSPACE/.github/scripts/configure-backend.sh gke ${{ needs.setup-environment.outputs.environment }}

      - name: Terraform Init
        working-directory: ${{ needs.setup-environment.outputs.working_dir }}
        run: terraform init

      - name: Create terraform.tfvars
        working-directory: ${{ needs.setup-environment.outputs.working_dir }}
        env:
          WORKLOAD_CLUSTERS_JSON: ${{ secrets.WORKLOAD_CLUSTERS_JSON }}
        run: |
          # Get the actual current kubectl context name
          KUBE_CONTEXT=$(kubectl config current-context)
          
          # Fetch cluster details using gcloud (bypasses terraform data source permissions issue)
          CLUSTER_ENDPOINT=$(gcloud container clusters describe ${{ secrets.CLUSTER_NAME }} --zone ${{ secrets.REGION }} --format="value(endpoint)")
          CLUSTER_CA=$(gcloud container clusters describe ${{ secrets.CLUSTER_NAME }} --zone ${{ secrets.REGION }} --format="value(masterAuth.clusterCaCertificate)")

          cat > terraform.tfvars <<EOF
          project_id               = "${{ secrets.GCP_PROJECT_ID }}"
          cluster_name             = "${{ secrets.CLUSTER_NAME }}"
          region                   = "${{ secrets.REGION }}"
          cluster_endpoint         = "$CLUSTER_ENDPOINT"
          cluster_ca_certificate   = "$CLUSTER_CA"
          hub_cluster_context      = "$KUBE_CONTEXT"
          hub_namespace            = "argocd"
          spoke_namespace          = "argocd"
          create_default_admin_user = true
          default_admin_password   = "${{ secrets.PASSWORD }}"
          
          # Keycloak
          enable_keycloak          = ${{ secrets.KEYCLOAK_URL != '' }}
          keycloak_url             = "${{ secrets.KEYCLOAK_URL }}"
          keycloak_client_id       = "${{ secrets.KEYCLOAK_CLIENT_ID }}"
          keycloak_password        = "${{ secrets.KEYCLOAK_PASSWORD }}"
          argocd_url               = "${{ secrets.ARGOCD_URL }}"

          # Ingress/Cert
          letsencrypt_email        = "${{ secrets.LETSENCRYPT_EMAIL_ARGOCD }}"
          argocd_host              = "${{ secrets.ARGOCD_HOST }}"
          EOF
          
          # Append workload_clusters if secret exists
          if [ -n "$WORKLOAD_CLUSTERS_JSON" ]; then
            echo "" >> terraform.tfvars
            echo "workload_clusters = $WORKLOAD_CLUSTERS_JSON" >> terraform.tfvars
            echo "✅ appended workload_clusters to terraform.tfvars"
          fi

          echo "✅ Created terraform.tfvars"

      - name: Install argocd-agentctl
        run: |
          curl -L -o argocd-agentctl https://github.com/argoproj-labs/argocd-agent/releases/download/v0.5.3/argocd-agentctl_linux-amd64
          chmod +x argocd-agentctl
          sudo mv argocd-agentctl /usr/local/bin/

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ needs.setup-environment.outputs.environment }}
          path: ${{ needs.setup-environment.outputs.working_dir }}

      - name: Import Keycloak Resources if exist
        working-directory: ${{ needs.setup-environment.outputs.working_dir }}
        run: |
          # Variable Setup
          KC_URL="${{ secrets.KEYCLOAK_URL }}"
          KC_USER="admin"  # Assuming default admin user, update if different
          KC_PASS="${{ secrets.KEYCLOAK_PASSWORD }}"
          REALM="argocd"
          
          echo "Installing jq..."
          sudo apt-get install -y jq

          # 1. Get Access Token (from master realm)
          echo "Authenticating to Keycloak..."
          TOKEN=$(curl -s -X POST "$KC_URL/realms/master/protocol/openid-connect/token" \
            -d "client_id=admin-cli" \
            -d "username=$KC_USER" \
            -d "password=$KC_PASS" \
            -d "grant_type=password" | jq -r '.access_token')

          if [ "$TOKEN" == "null" ] || [ -z "$TOKEN" ]; then
            echo "⚠ Failed to get Keycloak token. Skipping imports (Keycloak might not be up yet)."
            exit 0
          fi
          
          # Helper function for import
          import_resource() {
            local ADDR=$1
            local ID=$2
            # Use grep -F for fixed string matching to handle [ ] characters correctly without escaping issues
            if ! terraform state list | grep -F -q "$ADDR"; then
              echo "Importing $ADDR with ID $ID..."
              terraform import "$ADDR" "$ID" || echo "⚠ Import failed for $ADDR"
            else
              echo "✓ $ADDR already in state"
            fi
          }

          # 2. Import Realm
          # Realm import uses just the realm name
          if curl -s -H "Authorization: Bearer $TOKEN" "$KC_URL/admin/realms/$REALM" | grep -q "\"realm\":\"$REALM\""; then
            import_resource "module.hub_cluster[0].keycloak_realm.argocd[0]" "$REALM"
          fi

          # 3. Import Client (argocd)
          echo "Looking up Client 'argocd'..."
          CLIENT_UUID=$(curl -s -H "Authorization: Bearer $TOKEN" "$KC_URL/admin/realms/$REALM/clients?clientId=argocd" | jq -r '.[0].id')
          if [ "$CLIENT_UUID" != "null" ]; then
             import_resource "module.hub_cluster[0].keycloak_openid_client.argocd[0]" "$REALM/$CLIENT_UUID"
          fi

          # 4. Import Client Scope (groups)
          echo "Looking up Client Scope 'groups'..."
          SCOPE_UUID=$(curl -s -H "Authorization: Bearer $TOKEN" "$KC_URL/admin/realms/$REALM/client-scopes" | jq -r '.[] | select(.name=="groups") | .id')
          if [ -n "$SCOPE_UUID" ]; then
             import_resource "module.hub_cluster[0].keycloak_openid_client_scope.groups[0]" "$REALM/$SCOPE_UUID"
          fi

          # 5. Import Groups
          # Mapping: ArgoCDAdmins -> argocd_admins, ArgoCDDevelopers -> argocd_developers, ArgoCDViewers -> argocd_viewers
          declare -A KC_GROUPS
          KC_GROUPS=( ["ArgoCDAdmins"]="argocd_admins" ["ArgoCDDevelopers"]="argocd_developers" ["ArgoCDViewers"]="argocd_viewers" )

          for GROUP_NAME in "${!KC_GROUPS[@]}"; do
             RESOURCE_NAME="${KC_GROUPS[$GROUP_NAME]}"
             echo "Looking up Group '$GROUP_NAME'..."
             GROUP_UUID=$(curl -s -H "Authorization: Bearer $TOKEN" "$KC_URL/admin/realms/$REALM/groups?search=$GROUP_NAME" | jq -r ".[0] | select(.name==\"$GROUP_NAME\") | .id")
             
             if [ "$GROUP_UUID" != "null" ] && [ -n "$GROUP_UUID" ]; then
                import_resource "module.hub_cluster[0].keycloak_group.${RESOURCE_NAME}[0]" "$REALM/$GROUP_UUID"
             else
                echo "Group $GROUP_NAME not found via API."
             fi
          done

          # 6. Import Protocol Mapper (group-membership)
          echo "Looking up Protocol Mapper 'group-membership'..."
          # The mapper is attached to the Client Scope 'groups' (SCOPE_UUID), NOT the Client.
          if [ "$SCOPE_UUID" != "null" ]; then
             MAPPER_UUID=$(curl -s -H "Authorization: Bearer $TOKEN" "$KC_URL/admin/realms/$REALM/client-scopes/$SCOPE_UUID/protocol-mappers/models" | jq -r '.[] | select(.name=="group-membership") | .id')
             if [ -n "$MAPPER_UUID" ] && [ "$MAPPER_UUID" != "null" ]; then
                # Import ID Format: realm/client-scope/client_scope_id/mapper_id
                import_resource "module.hub_cluster[0].keycloak_openid_group_membership_protocol_mapper.groups_mapper[0]" "$REALM/client-scope/$SCOPE_UUID/$MAPPER_UUID"
             fi
          fi

          # 7. Import Ingress (argocd-server)
          # Conflict Resolution: The error indicates an ingress exists in 'argocd-agent' namespace (or similar).
          # We need to clear it from the old namespace if we are deploying to a new one ('argocd').
          echo "Checking for conflicting Ingress in 'argocd-agent' namespace..."
          kubectl delete ingress argocd-server -n argocd-agent --ignore-not-found || true

          # Now check target namespace
          INGRESS_NS="argocd"
          INGRESS_NAME="argocd-server"
          echo "Checking for existing Ingress '$INGRESS_NAME' in '$INGRESS_NS'..."
          if kubectl get ingress "$INGRESS_NAME" -n "$INGRESS_NS" >/dev/null 2>&1; then
             import_resource "module.hub_cluster[0].kubernetes_ingress_v1.argocd_ui[0]" "$INGRESS_NS/$INGRESS_NAME"
          fi

          # 8. Import User (argocd-admin)
          echo "Looking up User 'argocd-admin'..."
          USER_UUID=$(curl -s -H "Authorization: Bearer $TOKEN" "$KC_URL/admin/realms/$REALM/users?username=argocd-admin" | jq -r '.[0].id')
          if [ "$USER_UUID" != "null" ]; then
             import_resource "module.hub_cluster[0].keycloak_user.argocd_admin[0]" "$REALM/$USER_UUID"
          fi

      - name: Terraform Apply
        working-directory: ${{ needs.setup-environment.outputs.working_dir }}
        run: terraform apply -auto-approve

  verify-deployment:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [setup-environment, terraform-apply]
    environment: ${{ needs.setup-environment.outputs.environment }}
    env:
      KUBECONFIG: /home/runner/.kube/config
    steps:
      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          args: --advertise-tags=tag:ci --accept-routes
          hostname: github-runner-${{ github.run_id }}

      - name: Wait for Tailscale Connection
        run: |
          echo "Waiting for Tailscale to establish VPN connection..."
          sleep 15
          
          echo "======================================"
          echo "Tailscale Diagnostics"
          echo "======================================"
          
          echo "\n1. Tailscale Status:"
          sudo tailscale status
          
          echo "\n2. Tailscale IP:"
          sudo tailscale ip -4
          
          echo "\n3. Tailscale Routes:"
          sudo tailscale status --json | jq -r '.Peer[] | select(.TailscaleIPs != null) | "Peer: \(.HostName) - IPs: \(.TailscaleIPs[])"' || sudo tailscale status
          
          echo "\n4. Waiting additional 10 seconds for routes to stabilize..."
          sleep 10
          
          echo "\n5. Final Tailscale status:"
          sudo tailscale status
          
          echo "\n======================================"
          echo "Tailscale setup complete"
          echo "======================================"

      - name: Setup Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          
      - name: Verify Spoke Cluster Connectivity
        env:
          WORKLOAD_CLUSTERS_JSON: ${{ secrets.WORKLOAD_CLUSTERS_JSON }}
        run: |
          echo "Verifying spoke cluster connectivity via Tailscale..."
          
          if [ -z "$WORKLOAD_CLUSTERS_JSON" ]; then
            echo "No workload clusters configured, skipping connectivity check"
            exit 0
          fi
          
          # Extract spoke contexts from JSON
          CONTEXTS=$(echo "$WORKLOAD_CLUSTERS_JSON" | jq -r 'values[]' 2>/dev/null || echo "")
          
          if [ -z "$CONTEXTS" ]; then
            echo "Could not parse spoke contexts from WORKLOAD_CLUSTERS_JSON"
            exit 0
          fi
          
          echo "Testing connectivity to spoke clusters..."
          for CONTEXT in $CONTEXTS; do
            echo "Testing context: $CONTEXT"
            
            # Check if context exists in kubeconfig
            if kubectl config get-contexts "$CONTEXT" &>/dev/null; then
              echo "  ✓ Context $CONTEXT found in kubeconfig"
              
              # Test actual connectivity with timeout
              if timeout 10 kubectl get nodes --context "$CONTEXT" &>/dev/null; then
                echo "  ✓ Successfully connected to $CONTEXT"
              else
                echo "  ⚠ WARNING: Context $CONTEXT exists but cluster is not reachable"
                echo "  This may indicate Tailscale tunnel is not fully established"
                echo "  Waiting 15 more seconds..."
                sleep 15
                
                # Retry once
                if timeout 10 kubectl get nodes --context "$CONTEXT" &>/dev/null; then
                  echo "  ✓ Successfully connected to $CONTEXT after retry"
                else
                  echo "  ✗ ERROR: Cannot reach cluster $CONTEXT"
                  exit 1
                fi
              fi
            else
              echo "  ✗ ERROR: Context $CONTEXT not found in kubeconfig"
              echo "Available contexts:"
              kubectl config get-contexts
              exit 1
            fi
          done
          
          echo "✓ All spoke clusters are reachable"

      - uses: actions/checkout@v4
      - name: Authenticate to Google Cloud 
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Install gke-gcloud-auth-plugin
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-transport-https ca-certificates gnupg curl
          curl https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | sudo tee -a /etc/apt/sources.list.d/google-cloud-sdk.list
          sudo apt-get update
          sudo apt-get install -y google-cloud-sdk-gke-gcloud-auth-plugin

      - name: Configure kubectl (GKE)
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.CLUSTER_NAME }}
          location: ${{ secrets.REGION }}

      - name: Verify kubectl connection
        run: |
          echo "Current kubectl context:"
          kubectl config current-context
          echo "Available contexts:"
          kubectl config get-contexts
      - name: Install argocd-agentctl
        run: |
          curl -L -o argocd-agentctl https://github.com/argoproj-labs/argocd-agent/releases/download/v0.5.3/argocd-agentctl_linux-amd64
          chmod +x argocd-agentctl
          sudo mv argocd-agentctl /usr/local/bin/

      - name: Run Verification
        env:
          NAMESPACE: argocd
          HUB_CONTEXT: ${{ secrets.CLUSTER_NAME }}
          WORKLOAD_CLUSTERS_JSON: ${{ secrets.WORKLOAD_CLUSTERS_JSON }}
        run: |
          set -e
          echo "═══════════════════════════════════════════════════════════════"
          echo "ArgoCD Agent Deployment Verification"
          echo "═══════════════════════════════════════════════════════════════"
          
          # Get current context
          CURRENT_CONTEXT=$(kubectl config current-context)
          echo "✓ Current kubectl context: $CURRENT_CONTEXT"
          echo ""
          
          # ================================================================
          # 1. VERIFY HUB CLUSTER (PRINCIPAL) DEPLOYMENT
          # ================================================================
          echo "[1/5] Verifying Principal (Hub) Deployment..."
          echo "───────────────────────────────────────────────────────────────"
          
          # Check principal pods
          echo "Checking principal pods..."
          kubectl get pods -n $NAMESPACE -l app.kubernetes.io/name=argocd-agent-principal
          
          PRINCIPAL_READY=$(kubectl get pods -n $NAMESPACE -l app.kubernetes.io/name=argocd-agent-principal -o jsonpath='{.items[*].status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "")
          if [[ "$PRINCIPAL_READY" == *"True"* ]]; then
            echo "✓ Principal pod is running and ready"
          else
            echo "✗ ERROR: Principal pod is not ready"
            kubectl describe pods -n $NAMESPACE -l app.kubernetes.io/name=argocd-agent-principal
            exit 1
          fi
          
          # Check principal service
          echo ""
          echo "Checking principal service..."
          kubectl get svc -n $NAMESPACE argocd-agent-principal
          
          PRINCIPAL_IP=$(kubectl get svc -n $NAMESPACE argocd-agent-principal -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
          if [ -z "$PRINCIPAL_IP" ] || [ "$PRINCIPAL_IP" = "null" ]; then
            echo "⚠ WARNING: Principal LoadBalancer IP not yet assigned (may still be provisioning)"
            PRINCIPAL_IP="pending"
          else
            echo "✓ Principal LoadBalancer IP: $PRINCIPAL_IP"
          fi
          
          # Check principal logs for errors
          echo ""
          echo "Recent principal logs:"
          kubectl logs -n $NAMESPACE -l app.kubernetes.io/name=argocd-agent-principal --tail=20 || echo "⚠ Could not fetch logs"
          echo ""
          
          # ================================================================
          # 2. VERIFY SPOKE CLUSTERS CONFIGURATION
          # ================================================================
          echo "[2/5] Checking Workload Clusters Configuration..."
          echo "───────────────────────────────────────────────────────────────"
          
          if [ -z "$WORKLOAD_CLUSTERS_JSON" ]; then
            echo "⚠ WARNING: WORKLOAD_CLUSTERS_JSON is not configured"
            echo "Spoke agents will NOT be deployed automatically"
            echo "To enable spoke deployments, set the WORKLOAD_CLUSTERS_JSON secret"
            SKIP_SPOKE_VERIFICATION="true"
          else
            echo "✓ Workload clusters configured:"
            echo "$WORKLOAD_CLUSTERS_JSON" | jq . || echo "$WORKLOAD_CLUSTERS_JSON"
            SKIP_SPOKE_VERIFICATION="false"
          fi
          echo ""
          
          # ================================================================
          # 3. VERIFY SPOKE AGENT DEPLOYMENTS (if configured)
          # ================================================================
          if [ "$SKIP_SPOKE_VERIFICATION" = "false" ]; then
            echo "[3/5] Verifying Spoke Agent Deployments..."
            echo "───────────────────────────────────────────────────────────────"
            
            # Extract agent names from JSON (expecting format: {"agent-1": "spoke-1", ...})
            AGENT_NAMES=$(echo "$WORKLOAD_CLUSTERS_JSON" | jq -r 'keys[]' 2>/dev/null || echo "")
            
            if [ -z "$AGENT_NAMES" ]; then
              echo "⚠ WARNING: Could not parse agent names from WORKLOAD_CLUSTERS_JSON"
              echo "Skipping spoke verification"
            else
              for AGENT in $AGENT_NAMES; do
                SPOKE_CONTEXT=$(echo "$WORKLOAD_CLUSTERS_JSON" | jq -r ".\"$AGENT\"" 2>/dev/null || echo "")
                
                echo ""
                echo "Checking agent: $AGENT (context: $SPOKE_CONTEXT)"
                
                # Check if context exists
                if ! kubectl config get-contexts "$SPOKE_CONTEXT" &>/dev/null; then
                  echo "  ⚠ WARNING: Context '$SPOKE_CONTEXT' not found in kubeconfig"
                  echo "  Skipping verification for $AGENT"
                  continue
                fi
                
                # Check agent deployment
                if kubectl get deployment argocd-agent-agent -n $NAMESPACE --context "$SPOKE_CONTEXT" &>/dev/null; then
                  AGENT_READY=$(kubectl get deployment argocd-agent-agent -n $NAMESPACE --context "$SPOKE_CONTEXT" -o jsonpath='{.status.conditions[?(@.type=="Available")].status}' 2>/dev/null || echo "")
                  if [ "$AGENT_READY" = "True" ]; then
                    echo "  ✓ Agent deployment is ready"
                  else
                    echo "  ✗ Agent deployment exists but is not ready"
                    kubectl get pods -n $NAMESPACE --context "$SPOKE_CONTEXT" -l app.kubernetes.io/name=argocd-agent-agent
                  fi
                else
                  echo "  ✗ Agent deployment not found"
                  echo "  This may indicate the spoke was not deployed by Terraform"
                fi
              done
            fi
          else
            echo "[3/5] Skipping Spoke Agent Verification (not configured)"
          fi
          echo ""
          
          # ================================================================
          # 4. VERIFY AGENT REGISTRATION ON HUB
          # ================================================================
          echo "[4/5] Verifying Agent Registration on Hub..."
          echo "───────────────────────────────────────────────────────────────"
          
          # Check if agent CRD exists
          if kubectl get crd agents.argoproj.io &>/dev/null; then
            echo "✓ Agent CRD exists"
            
            # List registered agents
            echo ""
            echo "Registered agents:"
            if kubectl get agents -n $NAMESPACE &>/dev/null; then
              kubectl get agents -n $NAMESPACE
              
              AGENT_COUNT=$(kubectl get agents -n $NAMESPACE --no-headers 2>/dev/null | wc -l)
              echo ""
              echo "✓ Found $AGENT_COUNT registered agent(s)"
              
              # Show agent details
              if [ "$AGENT_COUNT" -gt 0 ]; then
                echo ""
                echo "Agent details:"
                kubectl get agents -n $NAMESPACE -o wide
              fi
            else
              echo "⚠ No agents registered yet"
              echo "This is normal if spokes haven't connected to principal yet"
            fi
          else
            echo "⚠ Agent CRD not found (may not be installed yet)"
          fi
          echo ""
          
          # ================================================================
          # 5. VERIFY ARGOCD CORE COMPONENTS
          # ================================================================
          echo "[5/5] Verifying ArgoCD Core Components..."
          echo "───────────────────────────────────────────────────────────────"
          
          # Run existing verification script if it exists
          if [ -f "$GITHUB_WORKSPACE/.github/scripts/verify-deployment.sh" ]; then
            chmod +x $GITHUB_WORKSPACE/.github/scripts/verify-deployment.sh
            $GITHUB_WORKSPACE/.github/scripts/verify-deployment.sh
          else
            echo "Basic ArgoCD component check:"
            kubectl get pods -n $NAMESPACE
          fi
          
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "Verification Summary"
          echo "═══════════════════════════════════════════════════════════════"
          echo "✓ Principal pod status: $PRINCIPAL_READY"
          echo "✓ Principal LoadBalancer IP: $PRINCIPAL_IP"
          if [ "$SKIP_SPOKE_VERIFICATION" = "false" ]; then
            echo "✓ Workload clusters configuration present"
            echo "  Note: Individual spoke status shown above"
          else
            echo "⚠ Workload clusters not configured"
          fi
          echo ""
          echo "Next steps:"
          if [ "$PRINCIPAL_IP" = "pending" ]; then
            echo "  1. Wait for Principal LoadBalancer IP to be assigned"
            echo "  2. Re-run this workflow to complete spoke deployment"
          elif [ "$SKIP_SPOKE_VERIFICATION" = "false" ]; then
            echo "  1. Verify spoke agents are connecting to principal"
            echo "  2. Deploy test applications to workload clusters"
          else
            echo "  1. Configure WORKLOAD_CLUSTERS_JSON secret"
            echo "  2. Re-run workflow to deploy spoke agents"
          fi
          echo "═══════════════════════════════════════════════════════════════"                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                